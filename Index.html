<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Still Time Café</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a4a3c">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
height:100vh;
overflow:hidden;
font-family:Georgia,serif;
color:#3b251a;
background:linear-gradient(145deg,#f4e8da,#d7b89a,#7a5947);
}

body::before{
content:"";
position:absolute;inset:0;
background:radial-gradient(#ffffff33 1px,transparent 1px);
background-size:8px 8px;
opacity:.25;
}

.dust{
position:absolute;width:100%;height:100%;
background:radial-gradient(circle,#fff8ee 1px,transparent 2px);
background-size:120px 120px;
animation:floatDust 40s linear infinite;
opacity:.4;
}

@keyframes floatDust{from{transform:translateY(0);}to{transform:translateY(-100px);}}

.card{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
width:85%;max-width:420px;
padding:45px 25px;
text-align:center;
background:rgba(255,245,235,.25);
backdrop-filter:blur(14px);
border-radius:40px;
box-shadow:0 20px 40px #4a2d1c55,inset 0 0 20px #ffffff55;
}

.title{font-size:18px;letter-spacing:5px;opacity:.7;}
.days{font-size:90px;font-weight:200;margin-top:10px;}
.label{letter-spacing:8px;font-size:13px;}
.clock{font-size:30px;margin-top:30px;letter-spacing:4px;}
.event{margin-top:35px;font-style:italic;opacity:.75;}
.date{margin-top:10px;font-size:14px;opacity:.55;}

.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;animation:breathe 12s ease-in-out infinite;}
.one{width:250px;height:250px;background:#fff0de;top:-80px;left:-60px;}
.two{width:280px;height:280px;background:#7c513f;bottom:-100px;right:-90px;animation-duration:16s;}

@keyframes breathe{
0%,100%{transform:scale(1) translate(0,0);}
50%{transform:scale(1.2) translate(20px,-30px);}
}
</style>
</head>

<body>

<div class="blob one"></div>
<div class="blob two"></div>
<div class="dust"></div>

<div class="card">
<div class="title">STILL TIME</div>
<div class="days" id="days">000</div>
<div class="label">DAGE</div>
<div class="clock" id="clock">00 : 00 : 00</div>
<div class="event">indtil min særlige dag</div>
<div class="date">24. oktober 2026</div>
</div>

<script>
const target=new Date("2026-10-24T00:00:00");
function update(){
const now=new Date();
const diff=target-now;

const d=Math.floor(diff/86400000);
const h=Math.floor(diff%86400000/3600000);
const m=Math.floor(diff%3600000/60000);
const s=Math.floor(diff%60000/1000);

document.getElementById("days").textContent=String(d).padStart(3,"0");
document.getElementById("clock").textContent=
`${String(h).padStart(2,"0")} : ${String(m).padStart(2,"0")} : ${String(s).padStart(2,"0")}`;
}
setInterval(update,1000);
update();
</script>

</body>
</html>
